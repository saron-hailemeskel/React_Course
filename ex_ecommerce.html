<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
     
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function ProductDetails({name, price,d_price,imageSrc}){

            return (
            <div>
            <img src={imageSrc} width="150"/>
            <p>{name}</p>
                
            { d_price ? <del><p>Price: ${price}</p></del>:<p>Price: ${price}</p>}
            {d_price &&
                <> 
                    <p>Discount_price:$ {d_price}</p>
                </>
            }
            <button>Add to Cart</button>
                

            </div>
            );


    };
    function App(){
        return(
            <>
            <ProductDetails name="Tennis Balls" price="6" imageSrc="images/ball.png"/>
            <ProductDetails name="Tishirt" price="7.99" imageSrc="images/tshirt.png"/>
            <ProductDetails name="socks" price="10" d_price="5" imageSrc="images/socks.png"/>
            </>
        );
    };


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
