<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>

  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      // first component
      function ChatInput() {
        return (
          <>
            {/* can't return 2 components without wrapping them in a parent component */}
            <input 
              placeholder="Send a message to ChatBot" 
              size="30" 
            />
            <button>Send</button>
          </>
        );
      }
       {/* function ChatMessage({message , sender})------this could be enough*/}
      function ChatMessage(props) {
        {/*destructuring */}
        {/*const {message, sender} = props;*/} 
         const message = props.message;
         const sender= props.sender; 

        //  if (sender === "robot") { 
        // return(
        //   <>
        //    {/* for layout */}
        //     <div>
        //      <img src=" image copy.png " width="50" />
        //      {message}
        //     </div>
        //   </>
        //     );
        //  }

        return (
          <>
           {/* for layout */}
            <div>
                {/* if 1st then do 2nd--&& guard operator */}
             {sender ==="robot"&& (
                <img src=" image copy.png " width="50" />
            )}
             {message}
             {sender ==="user" && (
                <img src="image.png " width="50" />
            )}
            </div>
          </>
        );
      }
      // hello chatbot--message
     function App() {
        return (
          <>
            <ChatInput />
            <ChatMessage  message="hello chatbot" sender="user"/>
            <ChatMessage  message="Hello! How can I help you" sender="robot"/>
            <ChatMessage  message="What day is it?" sender="user"/>
            <ChatMessage  message="Today is feburary 27" sender="robot"/>
          </>
        );
      }
